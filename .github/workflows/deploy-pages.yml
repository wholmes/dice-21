# Builds with Vite (base /dice-21/) and pushes dist/ to branch `gh-pages`.
#
# Setup (one time):
# 1. Repo → Settings → Actions → General → Workflow permissions:
#    enable "Read and write permissions" (needed to push gh-pages).
# 2. Repo → Settings → Pages → Build and deployment → Source:
#    "Deploy from a branch" → Branch: gh-pages / folder: / (root)
#
# If you previously used "GitHub Actions" as the Pages source, switch to
# "Deploy from a branch" and pick gh-pages after the first successful run.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
